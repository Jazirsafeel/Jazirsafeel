<svg width="860" height="260" viewBox="0 0 860 260" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;family=Syne:wght@800&amp;display=swap');

      .greeting {
        font-family: 'Space Mono', monospace;
        font-size: 11px;
        letter-spacing: 5px;
        fill: rgba(130,200,255,0.65);
        animation: fadeDown 0.8s ease forwards;
        opacity: 0;
      }
      .name {
        font-family: 'Syne', 'Space Mono', monospace;
        font-size: 44px;
        font-weight: 800;
        letter-spacing: -1px;
        fill: url(#nameGrad);
        animation: fadeUp 0.8s 0.25s ease forwards;
        opacity: 0;
        filter: url(#glow);
      }
      .subtitle {
        font-family: 'Space Mono', monospace;
        font-size: 12px;
        letter-spacing: 1px;
        fill: rgba(190,220,255,0.75);
        animation: fadeUp 0.8s 0.5s ease forwards;
        opacity: 0;
      }
      .badge-text {
        font-family: 'Space Mono', monospace;
        font-size: 9px;
        letter-spacing: 2px;
      }
      .badge-bg {
        animation: fadeUp 0.8s 0.75s ease forwards;
        opacity: 0;
      }
      .prompt {
        font-family: 'Space Mono', monospace;
        font-size: 12px;
        fill: rgba(120,180,255,0.45);
      }
      .typed {
        font-family: 'Space Mono', monospace;
        font-size: 12px;
        fill: rgba(200,225,255,0.85);
      }
      .cursor-bar {
        animation: blink 0.9s step-end infinite;
      }
      .name-cursor {
        animation: blink 1.1s step-end infinite, fadeUp 0.8s 0.5s ease forwards;
        opacity: 0;
      }

      /* wave animations */
      .w1 { animation: wave1 7.5s linear infinite; }
      .w2 { animation: wave2 10s linear infinite; }
      .w3 { animation: wave3 6.25s linear infinite; }
      .w4 { animation: wave4 11.25s linear infinite; }
      .w5 { animation: wave5 8.75s linear infinite; }
      .w6 { animation: wave6 5s linear infinite; }

      /* particle float */
      .p1  { animation: floatUp 8s 0s linear infinite; }
      .p2  { animation: floatUp 6s 1s linear infinite; }
      .p3  { animation: floatUp 10s 2s linear infinite; }
      .p4  { animation: floatUp 7s 0.5s linear infinite; }
      .p5  { animation: floatUp 9s 3s linear infinite; }
      .p6  { animation: floatUp 5s 1.5s linear infinite; }
      .p7  { animation: floatUp 11s 0.8s linear infinite; }
      .p8  { animation: floatUp 6.5s 2.5s linear infinite; }
      .p9  { animation: floatUp 8.5s 4s linear infinite; }
      .p10 { animation: floatUp 7.5s 0.3s linear infinite; }
      .p11 { animation: floatUp 9.5s 1.8s linear infinite; }
      .p12 { animation: floatUp 6.8s 3.5s linear infinite; }

      /* typing sequence */
      .t-line1 { animation: type1 14s 1s steps(1) infinite; }
      .t-line2 { animation: type2 14s 1s steps(1) infinite; }
      .t-line3 { animation: type3 14s 1s steps(1) infinite; }

      @keyframes blink { 50% { opacity: 0; } }
      @keyframes fadeDown { from { opacity:0; transform: translateY(-10px); } to { opacity:1; transform: translateY(0); } }
      @keyframes fadeUp   { from { opacity:0; transform: translateY(10px);  } to { opacity:1; transform: translateY(0); } }

      @keyframes wave1 {
        0%   { d: path("M0 143 Q108 121 215 143 Q323 165 430 143 Q538 121 645 143 Q753 165 860 143 L860 260 L0 260 Z"); }
        50%  { d: path("M0 155 Q108 133 215 155 Q323 177 430 155 Q538 133 645 155 Q753 177 860 155 L860 260 L0 260 Z"); }
        100% { d: path("M0 143 Q108 121 215 143 Q323 165 430 143 Q538 121 645 143 Q753 165 860 143 L860 260 L0 260 Z"); }
      }
      @keyframes wave2 {
        0%   { d: path("M0 162 Q215 140 430 162 Q645 184 860 162 L860 260 L0 260 Z"); }
        50%  { d: path("M0 170 Q215 148 430 170 Q645 192 860 170 L860 260 L0 260 Z"); }
        100% { d: path("M0 162 Q215 140 430 162 Q645 184 860 162 L860 260 L0 260 Z"); }
      }
      @keyframes wave3 {
        0%   { d: path("M0 178 Q107 156 215 178 Q322 200 430 178 Q537 156 645 178 Q752 200 860 178 L860 260 L0 260 Z"); }
        50%  { d: path("M0 165 Q107 143 215 165 Q322 187 430 165 Q537 143 645 165 Q752 187 860 165 L860 260 L0 260 Z"); }
        100% { d: path("M0 178 Q107 156 215 178 Q322 200 430 178 Q537 156 645 178 Q752 200 860 178 L860 260 L0 260 Z"); }
      }
      @keyframes wave4 {
        0%   { d: path("M0 192 Q215 174 430 192 Q645 210 860 192 L860 260 L0 260 Z"); }
        50%  { d: path("M0 200 Q215 182 430 200 Q645 218 860 200 L860 260 L0 260 Z"); }
        100% { d: path("M0 192 Q215 174 430 192 Q645 210 860 192 L860 260 L0 260 Z"); }
      }
      @keyframes wave5 {
        0%   { d: path("M0 208 Q107 190 215 208 Q322 226 430 208 Q537 190 645 208 Q752 226 860 208 L860 260 L0 260 Z"); }
        50%  { d: path("M0 218 Q107 200 215 218 Q322 236 430 218 Q537 200 645 218 Q752 236 860 218 L860 260 L0 260 Z"); }
        100% { d: path("M0 208 Q107 190 215 208 Q322 226 430 208 Q537 190 645 208 Q752 226 860 208 L860 260 L0 260 Z"); }
      }
      @keyframes wave6 {
        0%   { d: path("M0 224 Q215 208 430 224 Q645 240 860 224 L860 260 L0 260 Z"); }
        50%  { d: path("M0 230 Q215 214 430 230 Q645 246 860 230 L860 260 L0 260 Z"); }
        100% { d: path("M0 224 Q215 208 430 224 Q645 240 860 224 L860 260 L0 260 Z"); }
      }

      @keyframes floatUp {
        0%   { transform: translateY(0px);    opacity: 0; }
        10%  { opacity: 1; }
        90%  { opacity: 1; }
        100% { transform: translateY(-260px); opacity: 0; }
      }

      /* typing cycles: show each phrase 3.5s, gap 1s */
      @keyframes type1 {
        0%    { opacity: 1; }
        25%   { opacity: 1; }
        26%   { opacity: 0; }
        99%   { opacity: 0; }
        100%  { opacity: 1; }
      }
      @keyframes type2 {
        0%    { opacity: 0; }
        25%   { opacity: 0; }
        26%   { opacity: 1; }
        50%   { opacity: 1; }
        51%   { opacity: 0; }
        100%  { opacity: 0; }
      }
      @keyframes type3 {
        0%    { opacity: 0; }
        50%   { opacity: 0; }
        51%   { opacity: 1; }
        75%   { opacity: 1; }
        76%   { opacity: 0; }
        100%  { opacity: 0; }
      }
    </style>

    <!-- gradients & filters -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a0d8ff"/>
      <stop offset="35%"  stop-color="#7eb8ff"/>
      <stop offset="70%"  stop-color="#c9a0ff"/>
      <stop offset="100%" stop-color="#ff9de2"/>
    </linearGradient>

    <radialGradient id="bgGrad" cx="50%" cy="80%" r="80%">
      <stop offset="0%"   stop-color="#0d1a3a"/>
      <stop offset="60%"  stop-color="#080c22"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>

    <radialGradient id="glowBall" cx="40%" cy="35%" r="45%">
      <stop offset="0%"   stop-color="#4080ff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#4080ff" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="260" rx="16" fill="url(#bgGrad)"/>
  <rect width="860" height="260" rx="16" fill="url(#glowBall)"/>

  <!-- Border -->
  <rect width="860" height="260" rx="16" fill="none" stroke="rgba(100,180,255,0.12)" stroke-width="1"/>

  <!-- Floating particles -->
  <circle class="p1"  cx="80"  cy="240" r="1.2" fill="rgba(150,200,255,0.5)"/>
  <circle class="p2"  cx="160" cy="250" r="0.8" fill="rgba(160,180,255,0.4)"/>
  <circle class="p3"  cx="240" cy="245" r="1.4" fill="rgba(140,210,255,0.45)"/>
  <circle class="p4"  cx="320" cy="255" r="0.9" fill="rgba(180,160,255,0.4)"/>
  <circle class="p5"  cx="400" cy="248" r="1.1" fill="rgba(150,200,255,0.5)"/>
  <circle class="p6"  cx="480" cy="252" r="1.5" fill="rgba(130,190,255,0.35)"/>
  <circle class="p7"  cx="560" cy="242" r="0.7" fill="rgba(160,200,255,0.45)"/>
  <circle class="p8"  cx="640" cy="256" r="1.3" fill="rgba(150,170,255,0.4)"/>
  <circle class="p9"  cx="720" cy="246" r="1.0" fill="rgba(170,200,255,0.4)"/>
  <circle class="p10" cx="120" cy="258" r="1.2" fill="rgba(140,200,255,0.35)"/>
  <circle class="p11" cx="520" cy="260" r="0.9" fill="rgba(160,190,255,0.4)"/>
  <circle class="p12" cx="780" cy="250" r="1.1" fill="rgba(150,200,255,0.45)"/>

  <!-- Waves — back to front -->
  <path class="w1" fill="rgba(60,130,255,0.12)"
    d="M0 143 Q108 121 215 143 Q323 165 430 143 Q538 121 645 143 Q753 165 860 143 L860 260 L0 260 Z"/>

  <path class="w2" fill="rgba(110,70,255,0.10)"
    d="M0 162 Q215 140 430 162 Q645 184 860 162 L860 260 L0 260 Z"/>

  <path class="w3" fill="rgba(50,120,255,0.09)"
    d="M0 178 Q107 156 215 178 Q322 200 430 178 Q537 156 645 178 Q752 200 860 178 L860 260 L0 260 Z"/>

  <path class="w4" fill="rgba(140,80,255,0.08)"
    d="M0 192 Q215 174 430 192 Q645 210 860 192 L860 260 L0 260 Z"/>

  <path class="w5" fill="rgba(40,100,220,0.07)"
    d="M0 208 Q107 190 215 208 Q322 226 430 208 Q537 190 645 208 Q752 226 860 208 L860 260 L0 260 Z"/>

  <path class="w6" fill="rgba(170,90,255,0.06)"
    d="M0 224 Q215 208 430 224 Q645 240 860 224 L860 260 L0 260 Z"/>

  <!-- Content -->
  <!-- Greeting -->
  <text class="greeting" x="430" y="72" text-anchor="middle">HEY THERE, I'M</text>

  <!-- Name -->
  <text class="name" x="430" y="126" text-anchor="middle">Jazir Safeel</text>
  <!-- blinking name cursor -->
  <rect class="name-cursor" x="648" y="98" width="3" height="36" rx="1" fill="#7eb8ff"/>

  <!-- Typing line -->
  <text class="prompt" x="230" y="156" text-anchor="start">~/dev $</text>

  <!-- phrase 1 -->
  <text class="typed t-line1" x="300" y="156" text-anchor="start">full-stack dev. ai integrations._</text>
  <!-- phrase 2 -->
  <text class="typed t-line2" x="300" y="156" text-anchor="start" opacity="0">react · next.js · node · supabase_</text>
  <!-- phrase 3 -->
  <text class="typed t-line3" x="300" y="156" text-anchor="start" opacity="0">crafting fast, modern digital products_</text>
  <!-- blinking cursor on typed line -->
  <rect class="cursor-bar" x="590" y="143" width="7" height="14" rx="1" fill="rgba(130,200,255,0.8)"/>

  <!-- Badges -->
  <!-- Badge 1: Full-Stack Dev -->
  <g class="badge-bg">
    <rect x="196" y="170" width="120" height="22" rx="11" fill="rgba(126,184,255,0.06)" stroke="rgba(126,184,255,0.28)" stroke-width="0.8"/>
    <text class="badge-text" x="256" y="185" text-anchor="middle" fill="#7eb8ff">FULL-STACK DEV</text>
  </g>
  <!-- Badge 2: AI Explorer -->
  <g class="badge-bg">
    <rect x="330" y="170" width="100" height="22" rx="11" fill="rgba(201,160,255,0.06)" stroke="rgba(201,160,255,0.28)" stroke-width="0.8"/>
    <text class="badge-text" x="380" y="185" text-anchor="middle" fill="#c9a0ff">AI EXPLORER</text>
  </g>
  <!-- Badge 3: UI/UX -->
  <g class="badge-bg">
    <rect x="444" y="170" width="120" height="22" rx="11" fill="rgba(255,157,226,0.06)" stroke="rgba(255,157,226,0.28)" stroke-width="0.8"/>
    <text class="badge-text" x="504" y="185" text-anchor="middle" fill="#ff9de2">UI/UX ENTHUSIAST</text>
  </g>


</svg>
